<button type="button" id="gallery-tab" aria-controls="preset-gallery" aria-expanded="false" title="Open gallery">G</button>
<div id="preset-gallery" aria-label="Visual preset gallery">
  <div class="gallery-head">
    <div class="gallery-title">Gallery</div>
    <button type="button" id="gallery-close">Close</button>
  </div>
  <button type="button" class="preset-card" data-preset="category">
    <span class="preset-preview category"></span>
    <span>
      <span class="preset-name">Kajillion color</span>
      <span class="preset-copy">Original category colors for product and benchmark checks.</span>
    </span>
  </button>
  <button type="button" class="preset-card" data-preset="ion">
    <span class="preset-preview ion"></span>
    <span>
      <span class="preset-name">Ion bloom</span>
      <span class="preset-copy">Electric cyan, magenta, violet, and green for a brighter sci-fi pass.</span>
    </span>
  </button>
  <button type="button" class="preset-card" data-preset="cosmic">
    <span class="preset-preview cosmic"></span>
    <span>
      <span class="preset-name">Cosmic web</span>
      <span class="preset-copy">Intro-scale filaments, clustered lights, and a target anchor for the first zoom.</span>
    </span>
  </button>
  <button type="button" class="preset-card" data-preset="tokyo">
    <span class="preset-preview tokyo"></span>
    <span>
      <span class="preset-name">Tokyo globe</span>
      <span class="preset-copy">Outer-shell graph structure with white meshwork and a red disconnected sector.</span>
    </span>
  </button>
  <button type="button" class="preset-card" data-preset="subnet">
    <span class="preset-preview subnet"></span>
    <span>
      <span class="preset-name">Subnet map</span>
      <span class="preset-copy">White-mode clarity pass with large saturated communities and readable colored links.</span>
    </span>
  </button>
  <button type="button" class="preset-card" data-preset="analyst">
    <span class="preset-preview analyst"></span>
    <span>
      <span class="preset-name">Analyst cluster</span>
      <span class="preset-copy">Graphite edge field, outlined white nodes, and a blue semantic focus layer.</span>
    </span>
  </button>
  <button type="button" class="preset-card" data-preset="insight">
    <span class="preset-preview insight"></span>
    <span>
      <span class="preset-name">Insight map</span>
      <span class="preset-copy">Discourse-style map with gray ecology and two highlighted topic communities.</span>
    </span>
  </button>
  <button type="button" class="preset-card" data-preset="influence">
    <span class="preset-preview influence"></span>
    <span>
      <span class="preset-name">Influence cloud</span>
      <span class="preset-copy">Dense black-background social influence graph with radial hubs, labels, and colored factions.</span>
    </span>
  </button>
</div>
